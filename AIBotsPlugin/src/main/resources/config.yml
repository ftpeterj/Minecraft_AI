lm-studio:
  base-url: "http://dadsbox.local:1234/v1"
  # Leave empty to use the first model reported by LM Studio
  model: "llama-3.2-8x3b-moe-dark-champion-instruct-uncensored-abliterated-18.4b"
  timeout-seconds: 60
  max-tokens: 400
  temperature: 0.7

crew:
  max-bots-per-player: 6
  # "owner" = use summoner's Minecraft username skin (recommended)
  default-skin: "owner"
  # armorstand = reliable player-head skins on Paper 26 (recommended)
  # citizens = full player model (often solid black on Paper 26.1)
  avatar-mode: armorstand
  # Extra blocks upward for model footing
  y-offset: 0.0
  tick-interval: 20
  chat-mention-enabled: true
  show-title-on-nameplate: true

learning:
  # If true, writes learning.yml on every observation (heavier I/O)
  save-on-observe: false

storage:
  expand-when-full: true
  max-chests: 32
  prefer-double-chest: true

titles:
  scavenger:
    display: "Scavenger"
    color: "GOLD"
    personality: "You scavenge resources, fill chests, and expand storage when full. You help teammates who need materials. You learn good resource spots and storage habits."
    gather-radius: 24
    deposit-threshold: 8
    # false = only gather after /crew assign <name> gather ...
    auto-when-idle: false
    valued-materials:
      - OAK_LOG
      - BIRCH_LOG
      - SPRUCE_LOG
      - DARK_OAK_LOG
      - ACACIA_LOG
      - JUNGLE_LOG
      - CHERRY_LOG
      - COBBLESTONE
      - STONE
      - COAL_ORE
      - IRON_ORE
      - COPPER_ORE
      - SAND
      - GRAVEL
      - CLAY
  warrior:
    display: "Warrior"
    color: "RED"
    personality: "You protect the base, fight hostiles, and request gear from scavengers when needed. You learn threats and defensive patterns."
  builder:
    display: "Builder"
    color: "AQUA"
    personality: "You construct buildings and structures. You request blocks from scavengers when short on materials. You learn preferred styles."
  farmer:
    display: "Farmer"
    color: "GREEN"
    personality: "You farm crops, replant fields, and supply food to the crew. You learn which plots and crops work best."
