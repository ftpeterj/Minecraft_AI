name: AIBots
version: '1.5.0'
description: Multi-role AI crew — multi-LLM, inter-bot messaging, builder
main: com.aibots.AIBotsPlugin
api-version: '1.21'
author: ftpeterj
softdepend: [Citizens]

commands:
  crew:
    description: Manage AI crew bots (summon, titles, learning, assign, chat, msg)
    usage: /crew <summon|dismiss|list|title|skin|assign|stop|home|say|broadcast|msg|teach|memory|share|reload>
    permission: aibots.crew
    aliases: [aibot, aicrew]
  aibot:
    description: Legacy alias for /crew
    usage: /aibot <summon|dismiss|list|...>
    permission: aibots.crew

permissions:
  aibots.crew:
    description: Use AI crew commands
    default: true
  aibots.admin:
    description: Admin crew operations (reload, dismiss others)
    default: op
